<!DOCTYPE html>
<html>
<head>
    <title>Priyadarshini | AI Portfolio</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
    <style>
        body{
            background: linear-gradient(135deg,#141e30,#243b55);
            color:white;
            font-family:Arial;
            text-align:center;
            padding-top:50px;
        }

        .card{
            background:rgba(255,255,255,0.1);
            backdrop-filter:blur(10px);
            padding:40px;
            border-radius:20px;
            width:400px;
            margin:auto;
            box-shadow:0 10px 30px rgba(0,0,0,0.5);
        }

        h1{
            margin-bottom:10px;
        }

        #qrcode{
            margin-top:20px;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Priyadarshini </h1>
    <p>AI & Data Science Engineer</p>
    <p>GitHub: Darshini807</p>

    <h3>Scan to Visit My Website</h3>
    <div id="qrcode"></div>
</div>

<script>
    new QRCode(document.getElementById("qrcode"), {
        text: window.location.href,
        width: 200,
        height: 200
    });
</script>

</body>
</html>
